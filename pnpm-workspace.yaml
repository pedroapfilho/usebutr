packages:
  - apps/*
  - packages/*

allowBuilds:
  bigint-buffer: false
  bufferutil: true
  esbuild: true
  fallow: true
  keccak: true
  msgpackr-extract: false
  protobufjs: false
  sharp: true
  utf-8-validate: true

minimumReleaseAgeExclude:
  - "@ledgerhq/hw-app-btc@11.0.0"
  - cnfast@0.0.8

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@prisma/client"
  - "@prisma/engines"
  - "@swc/core"
  - "@tailwindcss/oxide"
  - bufferutil
  - esbuild
  - fallow
  - keccak
  - lightningcss
  - msw
  - prisma
  - sharp
  - unrs-resolver
  - utf-8-validate
