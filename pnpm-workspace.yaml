packages:
  - apps/*
  - packages/*

allowBuilds:
  bufferutil: true
  esbuild: true
  fallow: true
  keccak: true
  sharp: true
  utf-8-validate: true

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@prisma/client"
  - "@prisma/engines"
  - "@swc/core"
  - "@tailwindcss/oxide"
  - bufferutil
  - esbuild
  - fallow
  - keccak
  - lightningcss
  - msw
  - prisma
  - sharp
  - unrs-resolver
  - utf-8-validate
